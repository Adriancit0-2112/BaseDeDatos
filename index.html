<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Gestión de Alumnos</title>
</head>
<body>
  
  <div class="container">
    <header class="header">
      <h1>Gestión de Alumnos</h1>
      <p>Panel de administración académica</p>
    </header>

    <main class="dashboard-grid">
      
      <section class="card">
        <h2>Alta de Alumnos</h2>
        <div class="form-group">
          <label for="nombre">Nombre:</label>
          <input type="text" id="nombre" placeholder="Ej. Juan">
        </div>
        <div class="form-group">
          <label for="apellidos">Apellidos:</label>
          <input type="text" id="apellidos" placeholder="Ej. Pérez">
        </div>
        <div class="form-group">
          <label for="edad">Edad:</label>
          <input type="number" id="edad" placeholder="Ej. 18">
        </div>
        <button onclick="agregarAlumno()">Agregar Alumno</button>
      </section>

      <section class="card">
        <h2>Asignar Calificaciones</h2>
        <div class="form-group">
          <label for="alumno">Alumno:</label>
          <select id="alumno">
            <option value="">Selecciona un alumno...</option>
          </select>
        </div>
        <div class="form-group">
          <label for="materia">Materia:</label>
          <input type="text" id="materia" placeholder="Ej. Matemáticas">
        </div>
        <div class="form-group">
          <label for="calificacion">Calificación:</label>
          <input type="number" id="calificacion" placeholder="0 - 10">
        </div>
        <button onclick="asignarCalificacion()">Asignar Calificación</button>
      </section>

      <section class="card">
        <h2>Crear Grupo</h2>
        <div class="form-group">
          <label for="grupo">Nombre del Grupo:</label>
          <input type="text" id="grupo" placeholder="Ej. 1A Turismo">
        </div>
        <button onclick="crearGrupo()">Crear Grupo</button>
      </section>

      <section class="card">
        <h2>Búsqueda de Alumnos</h2>
        <div class="form-group">
          <label for="buscarNombre">Buscar por Nombre:</label>
          <div class="input-action">
            <input type="text" id="buscarNombre" placeholder="Nombre...">
            <button class="btn-secondary" onclick="buscarPorNombre()">Buscar</button>
          </div>
        </div>
        <div class="form-group">
          <label for="buscarApellido">Buscar por Apellido:</label>
          <div class="input-action">
            <input type="text" id="buscarApellido" placeholder="Apellido...">
            <button class="btn-secondary" onclick="buscarPorApellido()">Buscar</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Promedios</h2>
        <div class="form-group">
          <label for="promedioAlumno">Promedio del Alumno:</label>
          <div class="input-action">
            <select id="promedioAlumno"><option value="">Seleccionar...</option></select>
            <button class="btn-secondary" onclick="calcularPromedioAlumno()">Calcular</button>
          </div>
        </div>
        <div class="form-group">
          <label for="promedioGrupo">Promedio del Grupo:</label>
          <div class="input-action">
            <select id="promedioGrupo"><option value="">Seleccionar...</option></select>
            <button class="btn-secondary" onclick="calcularPromedioGrupo()">Calcular</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Lista de Alumnos</h2>
        <div class="form-group">
          <label for="ordenamiento">Ordenamiento:</label>
          <div class="input-action">
            <select id="ordenamiento">
              <option value="ascendente">A - Z (Ascendente)</option>
              <option value="descendente">Z - A (Descendente)</option>
            </select>
            <button class="btn-secondary" onclick="ordenarAlumnos()">Ordenar</button>
          </div>
        </div>
        
        <ul id="listaAlumnos" class="student-list">
          <li class="empty-state">Aún no hay alumnos registrados.</li>
        </ul>
      </section>

    </main>
  </div>

  <script src="main.js"></script>
</body>
</html>
